name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify site files
        run: |
          set -euo pipefail
          for path in \
            index.html \
            sumi-breath/index.html \
            wa-modern/index.html \
            tabelog-style/index.html \
            warm/index.html \
            machi-shokudo/index.html \
            showa-retro/index.html \
            garden-organic/index.html \
            instagram-soft/index.html \
            pop-comic/index.html \
            neon-night/index.html; do
            test -f "$path"
          done

      - name: Verify Unsplash image URLs
        run: |
          set -euo pipefail
          mapfile -t urls < <(grep -roh 'https://images.unsplash.com/[^"?]*[^"]*' --include='index.html' . | sort -u)
          for url in "${urls[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              echo "Broken image ($code): $url"
              exit 1
            fi
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy if GitHub Pages is temporarily unavailable
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
